<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة المستحيل: نسخة النيون الكوميدية</title>
    <link href="https://fonts.font.im/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; user-select: none; }
        body { background-color: #050510; color: white; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        #gameContainer { position: relative; width: 100%; max-width: 800px; height: 100%; max-height: 600px; background: #1a1a2e; box-shadow: 0 0 30px rgba(0, 210, 255, 0.5); overflow: hidden; border: 4px solid #00d2ff; border-radius: 15px; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* واجهة اللعبة (HUD) */
        .hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; font-size: 20px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #00d2ff; z-index: 10; pointer-events: none; }
        .death-counter { color: #ff2a5f; text-shadow: 0 0 10px #ff2a5f; }
        .in-game-troll { position: absolute; top: 60px; right: 15px; color: #f1c40f; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 10px; z-index: 10; display: none; }

        /* رسائل الموت المستفزة */
        #trollMessage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 16, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 32px; color: #ff2a5f; font-weight: 900; z-index: 20; text-align: center; padding: 30px; display: none; backdrop-filter: blur(8px); }
        .meme-text { font-size: 48px; margin-bottom: 25px; color: #fff; text-shadow: 0 0 15px #ff2a5f; line-height: 1.3;}
        .loading-text { font-size: 20px; color: #ccc; margin-top: 15px;}

        /* أزرار الموبايل */
        .mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 15; }
        .dir-controls { display: flex; gap: 15px; }
        .m-btn { width: 70px; height: 70px; border-radius: 20px; background: rgba(0, 210, 255, 0.2); border: 3px solid #00d2ff; color: white; font-size: 32px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .m-btn:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.9); }
        .jump-btn { width: 90px; border-radius: 50%; background: rgba(255, 42, 95, 0.2); border-color: #ff2a5f; box-shadow: 0 0 15px rgba(255, 42, 95, 0.4); }
        
        /* تأثير اهتزاز الشاشة عند الخسارة */
        @keyframes shake { 0% { transform: translate(15px, 15px); } 25% { transform: translate(-15px, -15px); } 50% { transform: translate(15px, -15px); } 75% { transform: translate(-15px, 15px); } 100% { transform: translate(0, 0); } }
        .shaking { animation: shake 0.4s; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="hud">
            <div id="levelText">المرحلة: 1</div>
            <div class="death-counter">عداد الغباء: <span id="deathCount">0</span> 💀</div>
        </div>
        <div class="in-game-troll" id="inGameTroll">جاري التحميل...</div>
        
        <div id="trollMessage">
            <div class="meme-text" id="memeText">عبالك سهلة؟ 😂</div>
            <div id="deathQuote" style="font-size: 24px; color: #f1c40f; margin-bottom: 20px;"></div>
            <div class="loading-text">(جاري إعادة التشغيل، ركز هالمرة! ⏳)</div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="mobile-controls">
            <div class="dir-controls">
                <div class="m-btn" id="btnLeft">←</div>
                <div class="m-btn" id="btnRight">→</div>
            </div>
            <div class="m-btn jump-btn" id="btnJump">↑</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const trollMessage = document.getElementById('trollMessage');
        const memeText = document.getElementById('memeText');
        const deathCountEl = document.getElementById('deathCount');
        const levelText = document.getElementById('levelText');
        const gameContainer = document.getElementById('gameContainer');
        const deathQuoteEl = document.getElementById('deathQuote');
        const inGameTrollEl = document.getElementById('inGameTroll');

        // مصفوفات التحشيش العراقية الكوميدية
        const trollQuotesAtDeath = [
            "عبالك تفوز بسهولة؟ 🤣", "ركز يمعود! لا تفشلنا 🤦‍♂️", "وين رايح؟ مو كتلك ركز! 😂", 
            "الفخ جاي! لا تنقهر 😉", "انتبه للمخفي يا عبقري 🕵️‍♂️", "أخوي الصغير يلعب أحسن منك 👶",
            "انتبه لا تطك! 💣", "وين عقلك؟ ركز زين 🤣", "جرب غير طريقة يا ذكي 🤔",
            "لا تستعجل! مو سباق 😂", "الفخوخ للطيبين بس 😉", "جرب تركض! مو تمشي🚶‍♂️"
        ];

        const trollQuotesInGame = [
            "شد حيلك!", "الفخ جاي!", "لا تستعجل!", "ركز يمعود!", "وين رايح؟",
            "جرب تنقز!", "مو سباق!", "ركز زين!", "لا تموت!", "وين عقلك؟", "جرب تركض!",
            "الفخوخ هواي!", "شد حيلك!", "لا تفشلنا!"
        ];

        let deaths = 0;
        let currentLevel = 1;
        let isDead = false;
        let camX = 0; // متغير الكاميرا لتتبع اللاعب

        // إعدادات اللاعب (النيون)
        let player = { x: 50, y: 400, w: 30, h: 30, vx: 0, vy: 0, speed: 6, jumpPower: -14, grounded: false, color: '#ff2a5f' };
        
        // المتغيرات الأساسية للمراحل
        let gravity = 0.7;
        let platforms = [];
        let traps = [];
        let triggers = [];
        let flag = { x: 700, y: 450, w: 40, h: 50 };
        let keys = {};
        let inGameTrollTimer;

        // ------------------ تصميم المراحل المتطورة والمنطقية ------------------
        function loadLevel(level) {
            player.x = 50; player.y = 300; player.vx = 0; player.vy = 0; isDead = false; camX = 0;
            platforms = []; traps = []; triggers = [];
            levelText.innerText = `المرحلة: ${level}`;
            clearInterval(inGameTrollTimer);

            if (level === 1) {
                // المرحلة الأولى (الأطول): دمج الفخاخ
                platforms.push({ x: 0, y: 500, w: 400, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
                platforms.push({ x: 550, y: 500, w: 600, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
                
                // الفخ المخفي (منطقي: يمكن تجنبه بالقفز)
                platforms.push({ x: 280, y: 350, w: 40, h: 40, type: 'hidden', revealed: false, color: '#ffd166', neon: '#ffd166' });
                
                // مسامير
                traps.push({ x: 400, y: 580, w: 150, h: 20, type: 'death' });
                traps.push({ x: 800, y: 580, w: 100, h: 20, type: 'death' });

                // سقف ينزل جزئياً
                let descendingCeiling = { x: 800, y: -200, w: 150, h: 400, type: 'trap_block', color: '#555', vy: 0, neon: '#ff2a5f' };
                traps.push(descendingCeiling);
                triggers.push({ x: 820, y: 0, w: 10, h: 600, active: true, action: function() { descendingCeiling.vy = 10; this.active = false; } });

                flag = { x: 1400, y: 450, w: 40, h: 50 };
                // منصة أخيرة للعلم
                platforms.push({ x: 1300, y: 500, w: 300, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
            } 
            else if (level === 2) {
                // المرحلة الثانية: منصات تختفي ومسامير متلاحقة
                platforms.push({ x: 0, y: 500, w: 600, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
                
                // مسامير متلاحقة
                for(let i=100; i<500; i+=100) { traps.push({ x: i, y: 580, w: 50, h: 20, type: 'death' }); }
                
                // منصات تختفي (منطقي: يجب القفز بسرعة)
                platforms.push({ x: 700, y: 400, w: 150, h: 20, type: 'disappearing', color: '#f1c40f', neon: '#f1c40f', timer: 0 });
                platforms.push({ x: 950, y: 300, w: 150, h: 20, type: 'disappearing', color: '#f1c40f', neon: '#f1c40f', timer: 0 });
                
                // مسامير تحت المنصات
                traps.push({ x: 600, y: 580, w: 600, h: 20, type: 'death' });
                
                flag = { x: 1600, y: 450, w: 40, h: 50 };
                platforms.push({ x: 1500, y: 500, w: 300, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
            }
            else if (level === 3) {
                // المرحلة الثالثة: منصات تتحرك بسرعة
                platforms.push({ x: 0, y: 500, w: 400, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
                
                // منصات تتحرك بسرعة (منطقي: يجب القفز بدقة)
                platforms.push({ x: 500, y: 400, w: 100, h: 20, type: 'moving', color: '#32CD32', neon: '#32CD32', vx: 5, startX: 500, endX: 900 });
                platforms.push({ x: 1000, y: 300, w: 100, h: 20, type: 'moving', color: '#32CD32', neon: '#32CD32', vx: -5, startX: 700, endX: 1000 });
                
                // مسامير تحت المنصات
                traps.push({ x: 400, y: 580, w: 1000, h: 20, type: 'death' });
                
                flag = { x: 1800, y: 450, w: 40, h: 50 };
                platforms.push({ x: 1700, y: 500, w: 300, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
            }
            else if (level === 4) {
                // المرحلة الرابعة: دمج جميع الفخاخ مع سقف قاتل
                platforms.push({ x: 0, y: 500, w: 300, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
                platforms.push({ x: 450, y: 500, w: 300, h: 100, type: 'solid', color: '#1a1a2e', neon: '#00d2ff' });
                
                // مقلب المربع المخفي (يمكن تجنبه)
                platforms.push({ x: 260, y: 350, w: 40, h: 40, type: 'hidden', revealed: false, color: '#ffd166', neon: '#ffd166' });
                
                // مسامير
                traps.push({ x: 300, y: 580, w: 150, h: 20, type: 'death' });
                
                // فخ السقف القاتل
                let fallingCeiling = { x: 450, y: -200, w: 150, h: 450, type: 'trap_block', color: '#555', vy: 0, neon: '#ff2a5f' };
                traps.push(fallingCeiling);
                triggers.push({ x: 470, y: 0, w: 10, h: 600, active: true, action: function() { fallingCeiling.vy = 20; this.active = false; } });
                
                flag = { x: 700, y: 450, w: 40, h: 50 };
            }
            else {
                // شاشة الفوز النهائية
                alert("مبروك! أنت أذكى من اللعبة وأخيراً فزت! 🎉");
                deaths = 0; currentLevel = 1; loadLevel(1);
            }

            // تشغيل التحشيشات أثناء اللعب
            inGameTrollEl.style.display = 'block';
            inGameTrollTimer = setInterval(() => {
                inGameTrollEl.innerText = trollQuotesInGame[Math.floor(Math.random() * trollQuotesInGame.length)];
            }, 3000);
        }

        // ------------------ نظام الفيزياء والتصادم المتطور ------------------
        function update() {
            if (isDead) return;

            // حركة اللاعب الأفقية
            if (keys['ArrowLeft'] || keys['btnLeft']) player.vx = -player.speed;
            else if (keys['ArrowRight'] || keys['btnRight']) player.vx = player.speed;
            else player.vx = 0;

            // القفز
            if ((keys['ArrowUp'] || keys['btnJump']) && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            // تطبيق الجاذبية
            player.vy += gravity;

            // تحديث الموقع الأفقي والتحقق من الاصطدام
            player.x += player.vx;
            for (let p of platforms) {
                if (p.type === 'disappearing' && p.timer > 0) continue; // لا تتصادم إذا كانت المنصة مختفية
                if (p.type === 'hidden' && !p.revealed) continue; // لا تتصادم إذا كانت المنصة مخفية تماماً بالأفقي
                if (checkCollision(player, p)) {
                    if (player.vx > 0) player.x = p.x - player.w;
                    else if (player.vx < 0) player.x = p.x + p.w;
                    player.vx = 0;
                }
            }

            // تحديث الموقع العمودي والتحقق من الاصطدام
            player.y += player.vy;
            player.grounded = false;
            for (let p of platforms) {
                if (p.type === 'disappearing' && p.timer > 0) { p.timer--; continue; } // لا تتصادم إذا كانت المنصة مختفية
                if (checkCollision(player, p)) {
                    if (player.vy > 0) { // السقوط على الأرض
                        if (p.type === 'hidden' && !p.revealed) continue;
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        if (p.type === 'moving') player.x += p.vx; // تحرك اللاعب مع المنصة المتحركة
                    } else if (player.vy < 0) { // ضرب الرأس من تحت
                        player.y = p.y + p.h;
                        player.vy = 0;
                        if (p.type === 'hidden') {
                            p.revealed = true; // كشف المقلب!
                            player.vy = 2; // ارتداد لأسفل
                        }
                    }
                }
            }

            // تحديث الفخاخ (السقف الساقط)
            for (let t of traps) {
                if (t.type === 'trap_block') {
                    t.y += t.vy;
                    if (t.y > 50) t.vy = 0; // التوقف عند الأرض
                }
                // تصادم المسامير والفخاخ
                if (checkCollision(player, t)) die();
            }

            // تحديث المنصات المتحركة
            for (let p of platforms) {
                if (p.type === 'moving') {
                    p.x += p.vx;
                    if (p.x < p.startX || p.x > p.endX) p.vx *= -1; // ارتداد المنصة المتحركة
                }
            }

            // تحديث الكاميرا لتتبع اللاعب
            camX = player.x - canvas.width / 2;
            if (camX < 0) camX = 0; // التأكد من أن الكاميرا لا تخرج عن حدود الشاشة من اليسار

            // السقوط خارج الشاشة
            if (player.y > canvas.height + 100) die();

            // التحقق من الحساسات (Triggers)
            for (let t of triggers) {
                if (t.active && checkCollision(player, t)) t.action();
            }

            // الوصول للعلم (الفوز بالمرحلة)
            if (checkCollision(player, flag)) {
                currentLevel++;
                loadLevel(currentLevel);
            }
        }

        // ------------------ نظام الرسم المتطور (النيون) ------------------
        function drawDisappearingPlatform(p) {
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.neon;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0;
        }

        function drawMovingPlatform(p) {
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.neon;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0;
        }

        function draw() {
            // تنظيف الشاشة ورسم الخلفية (النيون)
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // تفعيل الكاميرا
            ctx.save();
            ctx.translate(-camX, 0); // تحريك كل شيء بعكس حركة الكاميرا

            // رسم الأرضيات (النيون)
            for (let p of platforms) {
                if (p.type === 'hidden' && !p.revealed) continue;
                if (p.type === 'disappearing' && p.timer > 0) continue; // لا ترسم إذا كانت المنصة مختفية
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.neon;
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.shadowBlur = 0; // إعادة التوهج للصفر

                if (p.type === 'moving') drawMovingPlatform(p); // رسم المنصة المتحركة بشكل منفصل

                // لمسة جمالية (عشب)
                if (p.type === 'solid') {
                    ctx.fillStyle = '#32CD32';
                    ctx.fillRect(p.x, p.y, p.w, 15);
                }
                // شكل البلوك المخفي
                if (p.type === 'hidden' && p.revealed) {
                    ctx.fillStyle = '#111';
                    ctx.font = '24px Tajawal';
                    ctx.fillText('?', p.x + 10, p.y + 30);
                }
            }

            // رسم الفخاخ (النيون)
            for (let t of traps) {
                if (t.type === 'death') {
                    // رسم مسامير
                    ctx.fillStyle = '#ff2a5f';
                    for(let i=0; i<t.w; i+=15) {
                        ctx.beginPath(); ctx.moveTo(t.x+i, t.y+t.h); ctx.lineTo(t.x+i+7.5, t.y); ctx.lineTo(t.x+i+15, t.y+t.h); ctx.fill();
                    }
                } else if (t.type === 'trap_block') {
                    ctx.fillStyle = t.color;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = t.neon;
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.shadowBlur = 0;
                }
            }

            // رسم العلم (النيون)
            ctx.fillStyle = '#FFF';
            ctx.fillRect(flag.x, flag.y, 5, flag.h); // العصا
            ctx.fillStyle = '#32CD32';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#32CD32';
            ctx.beginPath(); ctx.moveTo(flag.x+5, flag.y); ctx.lineTo(flag.x+40, flag.y+15); ctx.lineTo(flag.x+5, flag.y+30); ctx.fill(); // الراية
            ctx.shadowBlur = 0;

            // رسم اللاعب (النيون)
            if (!isDead) {
                ctx.fillStyle = player.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = player.color;
                ctx.fillRect(player.x, player.y, player.w, player.h);
                ctx.shadowBlur = 0;
                // رسم عيون خائفة
                ctx.fillStyle = 'white';
                ctx.fillRect(player.x + 18, player.y + 5, 8, 8);
                ctx.fillStyle = 'black';
                ctx.fillRect(player.x + 22, player.y + 8, 4, 4);
            }

            // إيقاف الكاميرا
            ctx.restore();
        }

        // حلقة اللعبة
        function loop() {
            update();
            draw();
            if (!isDead) requestAnimationFrame(loop);
        }

        // ------------------ الموت والخسارة المستفزة ------------------
        function die() {
            if (isDead) return;
            isDead = true;
            deaths++;
            deathCountEl.innerText = deaths;
            clearInterval(inGameTrollTimer);
            inGameTrollEl.style.display = 'none';
            
            // اهتزاز الشاشة
            gameContainer.classList.add('shaking');
            setTimeout(() => gameContainer.classList.remove('shaking'), 300);

            // إظهار الرسالة المستفزة (التحشيشات العراقية)
            memeText.innerText = trollQuotesAtDeath[Math.floor(Math.random() * trollQuotesAtDeath.length)];
            deathQuoteEl.innerText = trollQuotesAtDeath[Math.floor(Math.random() * trollQuotesAtDeath.length)];
            trollMessage.style.display = 'flex';

            // إعادة المرحلة بعد 4 ثوانٍ (حتى يلحق يقراها)
            setTimeout(() => {
                trollMessage.style.display = 'none';
                loadLevel(currentLevel);
                loop();
            }, 4000);
        }

        // مساعدة التصادم
        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        // ------------------ نظام التحكم بالأزرار واللمس ------------------
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
            btn.addEventListener('mouseleave', () => keys[key] = false);
        };

        bindBtn('btnLeft', 'btnLeft');
        bindBtn('btnRight', 'btnRight');
        bindBtn('btnJump', 'btnJump');

        // بدء اللعبة
        loadLevel(1);
        loop();
    </script>
</body>
</html>
