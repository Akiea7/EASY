<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة المستحيل - مقالب (النسخة الجبارة)</title>
    <link href="https://fonts.font.im/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; user-select: none; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        #gameContainer { position: relative; width: 100%; max-width: 800px; height: 100%; max-height: 600px; background: #87CEEB; box-shadow: 0 0 30px rgba(0, 150, 255, 0.6), inset 0 0 50px rgba(0,0,0,0.3); overflow: hidden; border-radius: 10px; border: 4px solid #ff2a5f; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* واجهة اللعبة */
        .hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 20px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #000; z-index: 10; pointer-events: none; }
        .death-counter { color: #ff4757; text-shadow: 2px 2px 0 #000, 0 0 10px #ff4757; }
        .timer-hud { color: #2ed573; text-shadow: 2px 2px 0 #000, 0 0 10px #2ed573; }
        
        /* رسائل الموت المستفزة */
        #trollMessage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 40px; color: #ff2a5f; font-weight: 900; z-index: 20; text-align: center; padding: 20px; display: none; }
        .meme-text { font-size: 45px; margin-bottom: 20px; color: #fff; text-shadow: 0 0 15px #ff0000; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        
        /* أزرار الموبايل */
        .mobile-controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 15; }
        .dir-controls { display: flex; gap: 15px; }
        .m-btn { width: 70px; height: 70px; background: rgba(0, 0, 0, 0.6); border: 3px solid rgba(255,255,255,0.8); border-radius: 50%; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); transition: all 0.1s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .m-btn:active { background: rgba(255, 42, 95, 0.8); color: white; transform: scale(0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .jump-btn { width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle, #ff2a5f, #b31d44); border-color: #ff2a5f; }
        
        /* تأثير اهتزاز الشاشة عند الخسارة */
        @keyframes shake { 0% { transform: translate(10px, 10px); } 25% { transform: translate(-10px, -10px); } 50% { transform: translate(10px, -10px); } 75% { transform: translate(-10px, 10px); } 100% { transform: translate(0, 0); } }
        .shaking { animation: shake 0.3s; }
        
        /* شاشة البداية */
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; }
        #startScreen h1 { font-size: 60px; color: #00d2ff; margin-bottom: 10px; text-shadow: 0 0 20px #3a7bd5; animation: glow 2s infinite alternate; text-align: center; }
        @keyframes glow { from { text-shadow: 0 0 10px #00d2ff; } to { text-shadow: 0 0 30px #00d2ff, 0 0 60px #3a7bd5; } }
        #startScreen p { font-size: 20px; color: #fff; margin-bottom: 30px; text-align: center; max-width: 80%; }
        #startButton { padding: 15px 40px; font-size: 28px; background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; box-shadow: 0 5px 20px rgba(0, 210, 255, 0.5); transition: all 0.2s; }
        #startButton:hover { transform: scale(1.1); box-shadow: 0 8px 30px rgba(0, 210, 255, 0.8); }
        
        /* شاشة الفوز */
        #winScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; display: none; }
        #winScreen h1 { font-size: 60px; color: gold; margin-bottom: 20px; text-shadow: 0 0 20px yellow; text-align: center;}
        #winScreen p { font-size: 24px; color: #fff; margin-bottom: 15px; text-align: center; }
        .final-stats { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 2px solid gold; }
        #restartButton { padding: 15px 40px; font-size: 28px; background: linear-gradient(to right, gold, #d4af37); color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; transition: all 0.2s; }
        #restartButton:hover { transform: scale(1.1); }
        
        /* مؤشر التقدم */
        .progress-bar { position: absolute; top: 40px; left: 10px; right: 10px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; z-index: 10; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(to right, #ff2a5f, #00d2ff); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="startScreen">
            <h1>لعبة المستحيل<br>نسخة الـ 10 أضعاف</h1>
            <p>10 مراحل مستحيلة، فخاخ جديدة، ليزرات، وظلام دامس... هل أنت مستعد للبكاء؟</p>
            <button id="startButton">تحدى نفسك</button>
        </div>
        
        <div id="winScreen">
            <h1>أنت أسطورة! 👑</h1>
            <div class="final-stats">
                <p>عدد مرات الغباء (الموت): <span id="finalDeaths" style="color:#ff4757; font-weight:bold;">0</span></p>
                <p>الوقت الكلي: <span id="finalTime" style="color:#2ed573; font-weight:bold;">0</span> ثانية</p>
            </div>
            <button id="restartButton">العب من جديد</button>
        </div>
        
        <div class="hud">
            <div id="levelText">المرحلة: 1 / 10</div>
            <div class="timer-hud">الوقت: <span id="timeCount">0.0</span></div>
            <div class="death-counter">الغباء: <span id="deathCount">0</span> 💀</div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div id="trollMessage">
            <div class="meme-text" id="memeText">عبالك تفوز بسهولة؟ 😂</div>
            <div id="subMemeText" style="font-size: 24px; color: #aaa; margin-top:10px;">(جاري الإعادة...)</div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="mobile-controls">
            <div class="dir-controls">
                <div class="m-btn" id="btnLeft">←</div>
                <div class="m-btn" id="btnRight">→</div>
            </div>
            <div class="m-btn jump-btn" id="btnJump">↑</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const trollMessage = document.getElementById('trollMessage');
        const memeText = document.getElementById('memeText');
        const subMemeText = document.getElementById('subMemeText');
        const deathCountEl = document.getElementById('deathCount');
        const levelText = document.getElementById('levelText');
        const gameContainer = document.getElementById('gameContainer');
        const startScreen = document.getElementById('startScreen');
        const winScreen = document.getElementById('winScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const progressFill = document.getElementById('progressFill');
        const timeCountEl = document.getElementById('timeCount');

        // جمل مستفزة عند الخسارة بالعراقي
        const trollQuotes = [
            "عبالك سهلة؟ 😂", "شنو هالغباء! ركز 🤦‍♂️", "وين رايح يمعود؟ 🤣", 
            "هذا الفخ للطيبين بس 🤡", "أخوي الصغير يلعب أحسن منك 👶",
            "انتبه للمخفي يا ذكي 🕵️‍♂️", "العب زين لا افصل النت 🔌", 
            "يا أخي افتح عيونك! 👀", "هذا التحدي مو لضعاف القلوب 💪",
            "كم مرة متت لهسه؟ ما تستحي؟ 💀", "اللعبة تضحك عليك وتشمت بيك 😆", 
            "عفيه ذكاء! مستحيل 🧠", "هاي النهاية؟ استسلم أحسلك 😈",
            "القمزة مالتك تعبانة 🦘", "الي صمم اللعبة ديسلم عليك 👋"
        ];

        let deaths = 0;
        let currentLevel = 1;
        let isDead = false;
        let gameStarted = false;
        let gameTime = 0;
        let lastTime = 0;
        let globalFrameCount = 0;

        // إعدادات اللاعب المتطورة
        let player = { 
            x: 50, y: 400, w: 30, h: 30, 
            vx: 0, vy: 0, speed: 6, jumpPower: -13, 
            grounded: false, color: '#ff2a5f', facing: 'right',
            trail: [] // تأثير الظل/الذيل
        };
        
        let gravity = 0.65;
        let platforms = [];
        let traps = [];
        let triggers = [];
        let fakeFlags = [];
        let lasers = [];
        let flag = { x: 700, y: 450, w: 40, h: 50 };
        let keys = {};
        let particles = [];
        let cameraOffsetX = 0;

        // ------------------ تصميم المراحل الـ 10 ------------------
        function loadLevel(level) {
            player.x = 50; player.y = 300; player.vx = 0; player.vy = 0; player.trail = [];
            isDead = false; cameraOffsetX = 0; globalFrameCount = 0;
            platforms = []; traps = []; triggers = []; fakeFlags = []; lasers = [];
            levelText.innerText = `المرحلة: ${level} / 10`;
            particles = [];
            progressFill.style.width = `${((level - 1) / 10) * 100}%`;

            if (level === 1) {
                platforms.push({ x: 0, y: 500, w: 300, h: 100, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 450, y: 500, w: 350, h: 100, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 260, y: 350, w: 40, h: 40, type: 'hidden', revealed: false, color: '#FFD700' });
                traps.push({ x: 300, y: 580, w: 150, h: 20, type: 'death' });
                flag = { x: 700, y: 450, w: 40, h: 50 };
            } 
            else if (level === 2) {
                platforms.push({ x: 0, y: 500, w: 1000, h: 100, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 150, y: 350, w: 40, h: 40, type: 'hidden', revealed: false, color: '#FFD700' });
                platforms.push({ x: 300, y: 300, w: 40, h: 40, type: 'hidden', revealed: false, color: '#FFD700' });
                platforms.push({ x: 450, y: 250, w: 40, h: 40, type: 'hidden', revealed: false, color: '#FFD700' });
                traps.push({ x: 200, y: 580, w: 50, h: 20, type: 'death' });
                traps.push({ x: 350, y: 580, w: 50, h: 20, type: 'death' });
                traps.push({ x: 500, y: 580, w: 50, h: 20, type: 'death' });
                flag = { x: 900, y: 450, w: 40, h: 50 };
            }
            else if (level === 3) {
                for(let i=0; i<6; i++) {
                    platforms.push({ x: i*200, y: 500 - i*50, w: 100, h: 100 + i*50, type: 'solid', color: '#2c3e50' });
                }
                for (let i = 0; i < 5; i++) {
                    traps.push({ x: 150 + i * 200, y: 580, w: 30, h: 20, type: 'moving_spikes', direction: 1, speed: 3 });
                }
                flag = { x: 1050, y: 200, w: 40, h: 50 };
            }
            else if (level === 4) {
                platforms.push({ x: 0, y: 500, w: 1200, h: 100, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 0, y: 0, w: 1200, h: 20, type: 'solid', color: '#2c3e50' });
                for (let i = 0; i < 6; i++) {
                    traps.push({ x: 150 + i*150, y: 470, w: 20, h: 30, type: 'spike_up', vy: -4 });
                    traps.push({ x: 150 + i*150, y: 20, w: 20, h: 30, type: 'spike_down', vy: 4 });
                }
                platforms.push({ x: 300, y: 400, w: 80, h: 20, type: 'moving_platform', color: '#d35400', direction: 1, speed: 2 });
                platforms.push({ x: 600, y: 350, w: 80, h: 20, type: 'moving_platform', color: '#d35400', direction: -1, speed: 2.5 });
                flag = { x: 1100, y: 50, w: 40, h: 50 };
            }
            else if (level === 5) {
                platforms.push({ x: 0, y: 500, w: 200, h: 100, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 400, y: 500, w: 600, h: 100, type: 'solid', color: '#2c3e50' });
                traps.push({ x: 200, y: 580, w: 200, h: 20, type: 'death' });
                let fallingCeiling = { x: 450, y: -200, w: 300, h: 450, type: 'trap_block', color: '#333', vy: 0 };
                traps.push(fallingCeiling);
                triggers.push({
                    x: 460, y: 0, w: 10, h: 600, active: true,
                    action: function() { fallingCeiling.vy = 25; this.active = false; }
                });
                flag = { x: 850, y: 450, w: 40, h: 50 };
            }
            else if (level === 6) {
                platforms.push({ x: 0, y: 500, w: 800, h: 100, type: 'solid', color: '#2c3e50' });
                fakeFlags.push({ x: 400, y: 450, w: 40, h: 50 }); // هذا العلم يقتلك!
                platforms.push({ x: 380, y: 300, w: 80, h: 20, type: 'solid', color: '#2c3e50' });
                flag = { x: 700, y: 450, w: 40, h: 50 }; // العلم الحقيقي
                triggers.push({ 
                    x: 600, y: 0, w: 10, h: 600, active: true,
                    action: function() { flag.y = 150; platforms.push({ x: 680, y: 200, w: 80, h: 20, type: 'solid', color: '#2c3e50' }); this.active = false; }
                });
            }
            else if (level === 7) {
                platforms.push({ x: 0, y: 500, w: 1000, h: 100, type: 'solid', color: '#2c3e50' });
                for(let i=0; i<3; i++) {
                    lasers.push({ x: 300 + i*200, y: 0, w: 10, h: 500, active: true, toggleRate: 60 + i*20, counter: 0 });
                }
                flag = { x: 900, y: 450, w: 40, h: 50 };
            }
            else if (level === 8) {
                platforms.push({ x: 0, y: 500, w: 150, h: 100, type: 'solid', color: '#2c3e50' });
                for(let i=0; i<5; i++) {
                    platforms.push({ x: 200 + i*120, y: 400 - i*30, w: 60, h: 20, type: 'falling_platform', color: '#e67e22', vy: 0, touched: false });
                }
                traps.push({ x: 150, y: 580, w: 1000, h: 20, type: 'death' });
                platforms.push({ x: 800, y: 250, w: 200, h: 100, type: 'solid', color: '#2c3e50' });
                flag = { x: 900, y: 200, w: 40, h: 50 };
            }
            else if (level === 9) {
                platforms.push({ x: 0, y: 500, w: 200, h: 100, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 300, y: 400, w: 100, h: 20, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 500, y: 300, w: 100, h: 20, type: 'solid', color: '#2c3e50' });
                platforms.push({ x: 700, y: 200, w: 200, h: 400, type: 'solid', color: '#2c3e50' });
                traps.push({ x: 0, y: 580, w: 1000, h: 20, type: 'death' });
                traps.push({ x: 750, y: 180, w: 50, h: 20, type: 'death' }); 
                flag = { x: 850, y: 150, w: 40, h: 50 };
            }
            else if (level === 10) {
                platforms.push({ x: 0, y: 500, w: 100, h: 100, type: 'solid', color: '#2c3e50' });
                traps.push({ x: 100, y: 580, w: 1200, h: 20, type: 'death' });
                platforms.push({ x: 150, y: 400, w: 60, h: 20, type: 'falling_platform', color: '#e67e22', vy: 0, touched: false });
                lasers.push({ x: 250, y: 0, w: 10, h: 600, active: true, toggleRate: 50, counter: 0 });
                platforms.push({ x: 300, y: 300, w: 60, h: 20, type: 'moving_platform', color: '#d35400', direction: 1, speed: 3 });
                fakeFlags.push({ x: 450, y: 250, w: 40, h: 50 });
                
                let fallingCeiling = { x: 600, y: -200, w: 150, h: 400, type: 'trap_block', color: '#333', vy: 0 };
                traps.push(fallingCeiling);
                triggers.push({ x: 620, y: 0, w: 10, h: 600, active: true, action: function() { fallingCeiling.vy = 20; this.active = false; } });
                
                platforms.push({ x: 800, y: 400, w: 200, h: 200, type: 'solid', color: '#2c3e50' });
                flag = { x: 900, y: 350, w: 40, h: 50 };
            }
            else {
                gameStarted = false;
                document.getElementById('finalDeaths').innerText = deaths;
                document.getElementById('finalTime').innerText = (gameTime / 1000).toFixed(1);
                winScreen.style.display = 'flex';
            }
        }

        // ------------------ إنشاء جسيمات ------------------
        // هاي الدالة اللي جانت مفقودة وسببت التوقف (Crash)
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 3 + 2,
                    color: color,
                    life: 30
                });
            }
        }

        // ------------------ نظام الفيزياء والتصادم ------------------
        function update(timestamp) {
            if (isDead || !gameStarted) { lastTime = timestamp; return; }
            
            // تحديث الوقت
            if(lastTime) gameTime += (timestamp - lastTime);
            lastTime = timestamp;
            timeCountEl.innerText = (gameTime / 1000).toFixed(1);
            
            globalFrameCount++;

            // تحديث أثر اللاعب (Trail)
            player.trail.push({x: player.x, y: player.y});
            if(player.trail.length > 10) player.trail.shift();

            // الحركة الأفقية
            if (keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['btnLeft']) { player.vx = -player.speed; player.facing = 'left'; }
            else if (keys['ArrowRight'] || keys['d'] || keys['D'] || keys['btnRight']) { player.vx = player.speed; player.facing = 'right'; }
            else player.vx = 0;

            // القفز
            if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys['btnJump']) && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
                // إنشاء غبار للقفزة
                createParticles(player.x + player.w/2, player.y + player.h, 8, '#fff');
            }

            // الجاذبية
            player.vy += gravity;

            // تحديث الموقع الأفقي
            player.x += player.vx;
            for (let p of platforms) {
                if (p.type === 'hidden' && !p.revealed) continue;
                if (checkCollision(player, p)) {
                    if (player.vx > 0) player.x = p.x - player.w;
                    else if (player.vx < 0) player.x = p.x + p.w;
                    player.vx = 0;
                }
            }

            // تحديث الموقع العمودي
            player.y += player.vy;
            player.grounded = false;
            for (let p of platforms) {
                if (checkCollision(player, p)) {
                    if (player.vy > 0) { // السقوط على منصة
                        if (p.type === 'hidden' && !p.revealed) continue;
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        if(p.type === 'falling_platform') p.touched = true;
                    } else if (player.vy < 0) { // ضرب الرأس
                        player.y = p.y + p.h;
                        player.vy = 0;
                        if (p.type === 'hidden') {
                            p.revealed = true;
                            player.vy = 3;
                        }
                    }
                }
            }

            // تحديث الفخاخ والمنصات المتحركة والمتساقطة
            for (let t of traps) {
                if (t.type === 'trap_block') {
                    t.y += t.vy;
                    if (t.y > 50) t.vy = 0; 
                } else if (t.type === 'moving_spikes') {
                    t.x += t.speed * t.direction;
                    if (t.x <= 100 || t.x + t.w >= 1100) t.direction *= -1;
                } else if (t.type === 'spike_up' || t.type === 'spike_down') {
                    t.y += t.vy;
                    if (t.y <= 20 || t.y >= 470) t.vy *= -1;
                }
                if (checkCollision(player, t)) die();
            }

            for (let p of platforms) {
                if (p.type === 'moving_platform') {
                    p.x += p.speed * p.direction;
                    if (p.x <= 0 || p.x + p.w >= 1100) p.direction *= -1;
                } else if (p.type === 'falling_platform' && p.touched) {
                    p.vy += gravity * 0.5;
                    p.y += p.vy;
                }
            }

            // تحديث الليزر
            for(let l of lasers) {
                l.counter++;
                if(l.counter >= l.toggleRate) {
                    l.active = !l.active;
                    l.counter = 0;
                }
                if(l.active && checkCollision(player, l)) die();
            }

            // السقوط والموت
            if (player.y > canvas.height + 100) die();

            // فحص الأعلام المزيفة
            for(let ff of fakeFlags) {
                if(checkCollision(player, ff)) die();
            }

            // الحساسات
            for (let t of triggers) {
                if (t.active && checkCollision(player, t)) t.action();
            }

            // الوصول للعلم الحقيقي
            if (checkCollision(player, flag)) {
                currentLevel++;
                createParticles(flag.x + flag.w/2, flag.y + flag.h/2, 40, '#FFD700');
                loadLevel(currentLevel);
            }

            // تحديث الجسيمات
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.2; 
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            // الكاميرا
            cameraOffsetX = player.x - canvas.width / 3;
            if (cameraOffsetX < 0) cameraOffsetX = 0;
        }

        // ------------------ نظام الرسم ------------------
        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#1a1a2e");
            gradient.addColorStop(1, "#16213e");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i=0; i<20; i++) {
                ctx.fillStyle = `rgba(255,255,255,${0.1 + Math.random()*0.2})`;
                ctx.fillRect((i*73 + cameraOffsetX*0.1) % canvas.width, (i*41) % canvas.height, 2, 2);
            }

            let isDarkMode = (currentLevel === 9);

            for (let p of platforms) {
                if (p.type === 'hidden' && !p.revealed) continue;
                const screenX = p.x - cameraOffsetX;
                ctx.fillStyle = p.color;
                ctx.fillRect(screenX, p.y, p.w, p.h);
                
                if (p.type === 'solid' || p.type === 'falling_platform') {
                    ctx.fillStyle = '#1abc9c';
                    ctx.fillRect(screenX, p.y, p.w, 10);
                }
                
                if (p.type === 'hidden' && p.revealed) {
                    ctx.fillStyle = 'black';
                    ctx.font = '24px Arial';
                    ctx.fillText('?', screenX + 12, p.y + 30);
                }
            }

            for (let t of traps) {
                const screenX = t.x - cameraOffsetX;
                if (t.type === 'death' || t.type === 'moving_spikes') {
                    ctx.fillStyle = '#ff2a5f';
                    for(let i=0; i<t.w; i+=15) {
                        ctx.beginPath(); ctx.moveTo(screenX+i, t.y+t.h); ctx.lineTo(screenX+i+7.5, t.y); ctx.lineTo(screenX+i+15, t.y+t.h); ctx.fill();
                    }
                } else if (t.type === 'trap_block') {
                    ctx.fillStyle = t.color;
                    ctx.fillRect(screenX, t.y, t.w, t.h);
                    ctx.fillStyle = '#ff2a5f';
                    ctx.fillRect(screenX, t.y + t.h - 5, t.w, 5);
                } else if (t.type === 'spike_up' || t.type === 'spike_down') {
                    ctx.fillStyle = '#ff2a5f';
                    ctx.beginPath();
                    if (t.type === 'spike_up') {
                        ctx.moveTo(screenX, t.y+t.h); ctx.lineTo(screenX+t.w/2, t.y); ctx.lineTo(screenX+t.w, t.y+t.h); 
                    } else {
                        ctx.moveTo(screenX, t.y); ctx.lineTo(screenX+t.w/2, t.y+t.h); ctx.lineTo(screenX+t.w, t.y); 
                    }
                    ctx.fill();
                }
            }

            for(let l of lasers) {
                const screenX = l.x - cameraOffsetX;
                if(l.active) {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.7)';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'red';
                    ctx.fillRect(screenX, l.y, l.w, l.h);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(screenX + 3, l.y, 4, l.h);
                } else {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
                    ctx.fillRect(screenX, l.y, l.w, l.h);
                }
            }

            const drawFlag = (f, color) => {
                const sx = f.x - cameraOffsetX;
                ctx.fillStyle = '#FFF'; ctx.fillRect(sx, f.y, 5, f.h);
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.moveTo(sx+5, f.y); ctx.lineTo(sx+40, f.y+15); ctx.lineTo(sx+5, f.y+30); ctx.fill();
            }
            drawFlag(flag, '#2ecc71');
            for(let ff of fakeFlags) drawFlag(ff, '#2ecc71');

            if(!isDead && player.trail.length > 0) {
                for(let i=0; i<player.trail.length; i++) {
                    let pt = player.trail[i];
                    ctx.fillStyle = `rgba(255, 42, 95, ${i * 0.05})`;
                    ctx.fillRect(pt.x - cameraOffsetX, pt.y, player.w, player.h);
                }
            }

            if (!isDead) {
                const px = player.x - cameraOffsetX;
                ctx.fillStyle = player.color;
                ctx.fillRect(px, player.y, player.w, player.h);
                
                ctx.fillStyle = 'white';
                if (player.facing === 'right') {
                    ctx.fillRect(px + 18, player.y + 5, 8, 8);
                    ctx.fillStyle = 'black'; ctx.fillRect(px + 22, player.y + 8, 4, 4);
                } else {
                    ctx.fillRect(px + 4, player.y + 5, 8, 8);
                    ctx.fillStyle = 'black'; ctx.fillRect(px + 6, player.y + 8, 4, 4);
                }
            }

            for (let p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x - cameraOffsetX, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }

            if(isDarkMode && !isDead) {
                const px = player.x - cameraOffsetX + player.w/2;
                const py = player.y + player.h/2;
                let gradient = ctx.createRadialGradient(px, py, 20, px, py, 150);
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, 'rgba(0,0,0,0.98)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // ------------------ الموت ------------------
        function die() {
            if (isDead) return;
            isDead = true;
            deaths++;
            deathCountEl.innerText = deaths;
            
            // استدعاء الجسيمات للانفجار
            createParticles(player.x + player.w/2, player.y + player.h/2, 50, '#ff2a5f');
            
            gameContainer.classList.add('shaking');
            setTimeout(() => gameContainer.classList.remove('shaking'), 300);

            memeText.innerText = trollQuotes[Math.floor(Math.random() * trollQuotes.length)];
            let snarkyComments = ["(امسح دموعك وجرب مرة ثانية)", "(العب زين يمعود)", "(الفوز شبه مستحيل)"];
            subMemeText.innerText = snarkyComments[Math.floor(Math.random() * snarkyComments.length)];
            
            trollMessage.style.display = 'flex';

            setTimeout(() => {
                trollMessage.style.display = 'none';
                loadLevel(currentLevel);
            }, 1500);
        }

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        function loop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(loop);
        }

        // ------------------ نظام التحكم (أسهم + كيبورد + لمس) ------------------
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
            btn.addEventListener('mouseleave', () => keys[key] = false);
        };
        bindBtn('btnLeft', 'ArrowLeft');
        bindBtn('btnRight', 'ArrowRight');
        bindBtn('btnJump', 'ArrowUp');

        // أحداث الشاشة
        startButton.addEventListener('click', () => {
            startScreen.style.display = 'none';
            gameTime = 0; lastTime = 0; deaths = 0; currentLevel = 1;
            deathCountEl.innerText = deaths;
            gameStarted = true;
            loadLevel(1);
            requestAnimationFrame(loop);
        });

        restartButton.addEventListener('click', () => {
            winScreen.style.display = 'none';
            gameTime = 0; lastTime = 0; deaths = 0; currentLevel = 1;
            deathCountEl.innerText = deaths;
            gameStarted = true;
            loadLevel(1);
        });

        // رسم أولي
        draw();
    </script>
</body>
</html>
